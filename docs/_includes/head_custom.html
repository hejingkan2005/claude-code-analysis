<style>
/* Custom styles for responsive tables and full-width layout */

/* Override the main container to use full width */
.page-wrap {
  margin: 0 !important;
  padding: 0 !important;
}

.main-header {
  margin-left: 0 !important;
  margin-right: 0 !important;
}

/* Make the main content area use full available width */
.main-content {
  max-width: 100% !important;
  width: 100% !important;
  margin-left: 0 !important;
  margin-right: 0 !important;
  padding: 1.5rem 1.5rem !important;
  box-sizing: border-box;
}

/* Make tables take full width */
table {
  display: block;
  overflow-x: auto;
  border-collapse: collapse;
  width: 100%;
  table-layout: auto;
}

table thead {
  display: table;
  width: 100%;
  background-color: #f6f8fa;
}

table tbody {
  display: block;
  overflow-y: auto;
}

table tr {
  display: table;
  width: 100%;
  table-layout: auto;
}

table td, table th {
  word-wrap: break-word;
  white-space: normal;
  padding: 0.75rem;
  font-size: 0.95rem;
}

/* Responsive adjustments */
@media (max-width: 1200px) {
  .main-content {
    padding: 1rem 1rem !important;
  }
  
  table td, table th {
    padding: 0.6rem;
    font-size: 0.9rem;
  }
}

@media (max-width: 768px) {
  .main-content {
    padding: 0.75rem !important;
  }
  
  .side-bar {
    display: none;
  }
  
  table td, table th {
    padding: 0.5rem;
    font-size: 0.85rem;
  }
}
